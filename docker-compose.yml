version: "3.9"

services:
  api:
    build: .
    container_name: signverify-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount local models/ dir so you can swap .h5 files without rebuilding
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
